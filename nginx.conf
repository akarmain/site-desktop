server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # старый service worker — не кешировать (см. docs/deploy.md)
    location = /sw.js         { add_header Cache-Control "no-store"; try_files $uri =404; }
    location = /registerSW.js { add_header Cache-Control "no-store"; try_files $uri =404; }

    # API → FastAPI (имя сервиса из docker-compose)
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # статика + фоллбэк (роуты «/» и «/en/» отдают свои index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
